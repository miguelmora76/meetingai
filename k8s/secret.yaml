# Secret template — values are injected from environment variables at deploy time.
# Never put real keys here. Apply with:
#
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export ADMIN_TOKEN=your-strong-token
#   envsubst < k8s/secret.yaml | kubectl apply -f -
#
# Or use the helper script: ./scripts/k8s-apply.sh
#
# Required env vars:
#   ANTHROPIC_API_KEY  — Anthropic API key
#   ADMIN_TOKEN        — bearer token protecting POST /admin/reset
#
# Optional env vars (leave blank if not used):
#   POSTGRES_USER      — defaults to "meetingai"
#   POSTGRES_PASSWORD  — defaults to "meetingai"
#   SLACK_BOT_TOKEN
#   SLACK_SIGNING_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: meetingai-secrets
  namespace: meetingai
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  ADMIN_TOKEN: "${ADMIN_TOKEN}"
  POSTGRES_USER: "${POSTGRES_USER:-meetingai}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-meetingai}"
  SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
  SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET:-}"
